name: Daily static dashboard refresh

on:
  workflow_dispatch:
  schedule:
    # 19:30 IST, after the normal Indian market close data window.
    - cron: "0 14 * * 1-5"

permissions:
  contents: write   # commit the daily point-in-time universe history back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-build:
    runs-on: ubuntu-latest
    outputs:
      regressed: ${{ steps.guard.outputs.regressed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fetch today's official MidSmallcap 400 list, diff it against the tracked
      # membership, append any add/remove events (append-only) and rebuild the
      # master table. Non-fatal: a niftyindices outage must not block the deploy.
      - name: Update point-in-time universe (Nifty MidSmallcap 400)
        continue-on-error: true
        run: python update_universe_daily.py

      - name: Commit universe history
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changes.csv changes_microcap250.csv universe_membership.csv \
                  midsmallcap400_current.csv microcap250_current.csv universe_snapshots
          if git diff --cached --quiet; then
            echo "No universe changes to commit."
          else
            git commit -m "Daily universe update [skip ci]"
            git push
          fi

      - name: Refresh market data
        run: python refresh_market_data.py

      - name: Build static data bundle
        run: python build_static_site.py

      - name: Validate static bundle
        run: python -m json.tool site/data/metadata.json >/dev/null

      # Yahoo sometimes serves the latest trading day with volume but no
      # finalized OHLC yet, which gets dropped and can make this build cover
      # FEWER trading days than what's already live. Skip deploying in that
      # case so a good day is never silently overwritten by a worse one.
      - name: Guard against data regression
        id: guard
        run: python check_no_regression.py

      - uses: actions/configure-pages@v5
        if: steps.guard.outputs.regressed != 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.guard.outputs.regressed != 'true'
        with:
          path: site

  deploy:
    needs: refresh-and-build
    if: needs.refresh-and-build.outputs.regressed != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
